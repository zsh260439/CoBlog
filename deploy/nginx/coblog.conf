server {
  listen 80;
  server_name coblog.top www.coblog.top;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name coblog.top www.coblog.top;

  root /opt/coblog/client/dist;
  index index.html;

  client_max_body_size 10m;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* "^/assets/.+\.[a-f0-9]{8,}\.(css|js|png|jpe?g|gif|svg|webp|ico|woff2?)$" {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location ~ ^/(articles|auth|messages|taxonomies|uploads|ai|visits)(/.*)?$ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  ssl_certificate /etc/letsencrypt/live/coblog.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/coblog.top/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
