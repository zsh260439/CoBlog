name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NODE_ENV: production

      # 先上传文件
      - name: Upload files to ECS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "apps/server/dist/,apps/client/dist/"
          target: "C:/coblog/"
          strip_components: 2

      # 上传完成后执行部署命令
      - name: Deploy to Windows ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd C:\coblog
            mkdir server\dist 2>nul || echo "exists"
            mkdir client\dist 2>nul || echo "exists"
            copy C:\coblog\.env server\.env 2>nul || echo "no env"
            pm2 stop coblog-api 2>nul || echo "not running"
            pm2 start server\dist\main.js --name coblog-api
            pm2 save