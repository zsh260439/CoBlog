name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload server dist
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.ECS_HOST }}
          REMOTE_USER: ${{ secrets.ECS_USER }}
          SOURCE: 'apps/server/dist/'
          TARGET: 'C:/coblog/server/dist/'

      - name: Upload client dist
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.ECS_HOST }}
          REMOTE_USER: ${{ secrets.ECS_USER }}
          SOURCE: 'apps/client/dist/'
          TARGET: 'C:/coblog/client/dist/'

      - name: Restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd C:\coblog\server
            copy C:\coblog\.env .env
            pm2 stop coblog-api || true
            pm2 start dist\main.js --name coblog-api
            pm2 save