name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NODE_ENV: production

      - name: Prepare deploy package
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('fs')
          const pkg = JSON.parse(fs.readFileSync('apps/server/package.json', 'utf8'))
          delete pkg.dependencies['@coblog/types']
          fs.mkdirSync('.deploy', { recursive: true })
          fs.writeFileSync('.deploy/server-package.json', `${JSON.stringify(pkg, null, 2)}\n`)
          EOF

      - name: Configure SSH
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH key
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o PreferredAuthentications=publickey \
            -o PasswordAuthentication=no \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_rsa \
            Administrator@"$ECS_HOST" \
            -p 22 \
            "powershell -NoProfile -Command \"Write-Output ok\""

      - name: Prepare remote directories
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_rsa \
            Administrator@"$ECS_HOST" \
            -p 22 \
            "powershell -NoProfile -Command \"New-Item -ItemType Directory -Force -Path 'C:\\coblog\\server', 'C:\\coblog\\client' | Out-Null\""

      - name: Upload server package.json
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          scp \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_rsa \
            -P 22 \
            .deploy/server-package.json \
            Administrator@"$ECS_HOST":C:/coblog/server/package.json

      - name: Upload server dist
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          scp \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_rsa \
            -P 22 \
            -r apps/server/dist \
            Administrator@"$ECS_HOST":C:/coblog/server/

      - name: Upload client dist
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          scp \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_rsa \
            -P 22 \
            -r apps/client/dist \
            Administrator@"$ECS_HOST":C:/coblog/client/

      - name: Restart app
        shell: bash
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_rsa \
            Administrator@"$ECS_HOST" \
            -p 22 \
            "powershell -NoProfile -Command \"\$ErrorActionPreference = 'Stop'; Set-Location 'C:\\coblog\\server'; if (Test-Path 'C:\\coblog\\.env') { Copy-Item 'C:\\coblog\\.env' '.env' -Force }; npm install --omit=dev; try { pm2 delete coblog-api | Out-Null } catch {}; pm2 start 'C:\\coblog\\server\\dist\\main.js' --name coblog-api; pm2 save\""
