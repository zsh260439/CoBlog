name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          NODE_ENV: production

      # 兼容 Windows 的部署方式
      - name: Deploy to Windows ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          # Windows 命令 + 直接上传文件
          script: |
            cd C:\coblog
            mkdir server\dist || true
            mkdir client\dist || true
            copy C:\coblog\.env server\.env
            pm2 stop coblog-api || true
            pm2 start server\dist\main.js --name coblog-api
            pm2 save

      # 文件上传用 scp
      - name: Upload files to ECSa
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "apps/server/dist/,apps/client/dist/"
          target: "C:/coblog/"
          strip_components: 2