<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1680" viewBox="0 0 1500 1680">
  <defs>
    <style>
      .bg { fill: #f6f7f9; }
      .title { font: 700 34px 'Microsoft YaHei', Arial, sans-serif; fill: #111; }
      .sub { font: 500 16px 'Microsoft YaHei', Arial, sans-serif; fill: #666; }
      .card { fill: #fff; stroke: #111; stroke-width: 2; rx: 18; ry: 18; }
      .soft { fill: #fbfbfc; stroke: #cfd6df; stroke-width: 1.6; rx: 18; ry: 18; }
      .tag { font: 700 13px 'Microsoft YaHei', Arial, sans-serif; fill: #4b5563; }
      .head { font: 700 20px 'Microsoft YaHei', Arial, sans-serif; fill: #111; }
      .body { font: 500 15px 'Microsoft YaHei', Arial, sans-serif; fill: #1f2937; }
      .note { fill: #eef7ff; stroke: #7aa7d6; stroke-width: 1.6; rx: 14; ry: 14; }
      .noteText { font: 500 14px 'Microsoft YaHei', Arial, sans-serif; fill: #234; }
      .arrow { stroke: #111; stroke-width: 2.4; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111" />
    </marker>
  </defs>

  <rect class="bg" width="1500" height="1680"/>
  <text x="60" y="70" class="title">退出登录全过程流程图</text>
  <text x="60" y="102" class="sub">把“前端点击退出”到“数据库 refreshToken 失效、cookie 清除、本地 token 清除”的整条链完整展开。</text>

  <rect x="70" y="150" width="1360" height="140" class="card"/>
  <text x="100" y="185" class="tag">用户操作</text>
  <text x="100" y="220" class="head">步骤 1：点击退出登录按钮</text>
  <text x="100" y="252" class="body">前端开始执行 `logout()`，目标是让本地、cookie、数据库三处状态同时失效。</text>

  <path d="M750 290 L750 330" class="arrow"/>

  <rect x="70" y="330" width="1360" height="210" class="soft"/>
  <text x="100" y="365" class="tag">前端 · servers/auth.ts + http-utils</text>
  <text x="100" y="400" class="head">步骤 2：logout 请求最好走普通 `request`，这样会自动带 Bearer accessToken</text>
  <text x="100" y="435" class="body">- 后端 `POST /auth/logout` 被 `AuthGuard` 保护</text>
  <text x="100" y="465" class="body">- 所以退出接口本身也需要 accessToken 才能确认“是谁在退出”</text>
  <text x="100" y="495" class="body">- 如果 logout 走不带 Bearer 的实例，就会先在 Guard 阶段 401</text>

  <path d="M750 540 L750 580" class="arrow"/>

  <rect x="70" y="580" width="1360" height="220" class="card"/>
  <text x="100" y="615" class="tag">后端 · AuthGuard + AuthController.logout()</text>
  <text x="100" y="650" class="head">步骤 3：后端先验证 accessToken，再执行真正的退出逻辑</text>
  <text x="100" y="685" class="body">- `AuthGuard.canActivate()` 读取 `Authorization`，拆出 Bearer accessToken</text>
  <text x="100" y="715" class="body">- 用 `JwtService.verifyAsync(token, JWT_SECRET)` 验证 accessToken</text>
  <text x="100" y="745" class="body">- 成功后把 payload 挂到 `request.user`，Controller 才能继续</text>

  <path d="M750 800 L750 840" class="arrow"/>

  <rect x="70" y="840" width="1360" height="240" class="card"/>
  <text x="100" y="875" class="tag">后端 · AuthService.logout()</text>
  <text x="100" y="910" class="head">步骤 4：Service 把数据库中保存的 refreshToken 哈希清空</text>
  <text x="100" y="945" class="body">- Controller 从 `request.user.userId` 取当前用户 id</text>
  <text x="100" y="975" class="body">- 调 `authService.logout(userId)`</text>
  <text x="100" y="1005" class="body">- 内部执行 `findByIdAndUpdate(userId, { refreshToken: '' })`</text>
  <text x="100" y="1035" class="body">- 这一步的含义是：即使浏览器里旧 cookie 没及时消失，也不能再通过 refresh 续签</text>

  <path d="M750 1080 L750 1120" class="arrow"/>

  <rect x="70" y="1120" width="1360" height="220" class="soft"/>
  <text x="100" y="1155" class="tag">后端 · Controller 收尾</text>
  <text x="100" y="1190" class="head">步骤 5：Controller 还会把浏览器中的 refresh cookie 清掉</text>
  <text x="100" y="1225" class="body">- `response.clearCookie('refresh_token')`</text>
  <text x="100" y="1255" class="body">- 返回 `ApiResponse.success(null, '退出成功')`</text>
  <text x="100" y="1285" class="body">- 这意味着后端两处状态都已经失效：数据库 hash 和浏览器 refresh cookie</text>

  <path d="M750 1340 L750 1380" class="arrow"/>

  <rect x="70" y="1380" width="1360" height="150" class="card"/>
  <text x="100" y="1415" class="tag">前端收尾</text>
  <text x="100" y="1450" class="head">步骤 6：前端还应该补一层本地状态清理</text>
  <text x="100" y="1485" class="body">- `localStorage.removeItem('local-token')`</text>
  <text x="100" y="1515" class="body">- 然后 `router.push('/login')` 或 `window.location.href = '/login'`</text>

  <rect x="70" y="1560" width="1360" height="90" class="note"/>
  <text x="95" y="1595" class="head">退出登录阶段最重要的一句话</text>
  <text x="95" y="1628" class="noteText">真正完整的退出登录，一定是同时清掉三处：前端 accessToken、本地/浏览器中的 refreshToken、数据库中的 refreshToken 哈希。</text>
</svg>
